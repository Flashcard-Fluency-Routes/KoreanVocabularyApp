<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terms, Privacy &amp; Disclaimer</title>
  <style>
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 1.5rem;
      line-height: 1.6;
      color: #333;
      background: #fafafa;
    }
    h1 {
      font-size: 1.6rem;
      color: #222;
      border-bottom: 2px solid #ccc;
      padding-bottom: 0.5rem;
      margin-top: 1.5rem;
    }
    h3 {
      color: #222;
      margin-top: 1.5rem;
    }
    a { color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: 0.25rem;
      margin: 1.5rem 0 0;
      border-bottom: 2px solid #ddd;
    }
    .tab-bar button {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      padding: 0.55rem 1.1rem;
      font-size: 0.95rem;
      cursor: pointer;
      color: #555;
      border-radius: 4px 4px 0 0;
      transition: color 0.15s;
    }
    .tab-bar button:hover { color: #111; }
    .tab-bar button.active {
      color: #1a73e8;
      border-bottom-color: #1a73e8;
      font-weight: 600;
    }

    /* Panels */
    .tab-panel { display: none; padding-top: 0.5rem; }
    .tab-panel.active { display: block; }

    /* "Last updated" line */
    .legal-effective {
      font-size: 0.85rem;
      color: #777;
      margin-top: 0.25rem;
    }

    footer {
      text-align: center;
      font-size: 0.9rem;
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #ddd;
      color: #666;
    }

    pre.legal-license-block {
      font-family: "Courier New", Courier, monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 1rem 1.25rem;
      margin: 0.75rem 0 1rem;
      white-space: pre-wrap;
      overflow-x: auto;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>Terms, Privacy &amp; Disclaimer</h1>

  <div class="tab-bar">
    <button class="active" data-tab="terms">Terms of Use</button>
    <button data-tab="privacy">Privacy Policy</button>
    <button data-tab="disclaimer">Disclaimer</button>
    <button data-tab="opensource">Open Source &amp; Licensing</button>
  </div>

  <div id="panel-terms"      class="tab-panel active"></div>
  <div id="panel-privacy"    class="tab-panel"></div>
  <div id="panel-disclaimer" class="tab-panel"></div>
  <div id="panel-opensource" class="tab-panel"></div>

  <footer>
    &copy; <span data-brand="operator-name">Flashcard Fluency Routes</span> &nbsp;&nbsp;|&nbsp;&nbsp;
    <a data-brand="operator-privacy-email" href="mailto:info@flashcardfluencyroutes.com">info@flashcardfluencyroutes.com</a> &nbsp;&nbsp;|&nbsp;&nbsp;
    <a href="javascript:history.back()">&#8592; Back</a>
  </footer>

  <script type="module">
    import { LEGAL_CONTENT } from './legal.js';
    import { initBrand } from './brand_loader.js';

    document.getElementById('panel-terms').innerHTML      = LEGAL_CONTENT.terms;
    document.getElementById('panel-privacy').innerHTML    = LEGAL_CONTENT.privacy;
    document.getElementById('panel-disclaimer').innerHTML = LEGAL_CONTENT.disclaimer;
    document.getElementById('panel-opensource').innerHTML = LEGAL_CONTENT.opensource;

    // initBrand runs after innerHTML injection so data-brand elements inside legal content are found
    initBrand();

    document.querySelectorAll('.tab-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
